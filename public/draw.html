<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Mission � Dessine la forme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#0d0d1a;
      font-family:'Poppins', Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:22px;
      user-select:none;
      -webkit-user-select:none;
    }
    h1 {
      color:#fff;
      font-size:clamp(15px,4.5vw,21px);
      font-weight:800;
      letter-spacing:.1em;
      text-align:center;
    }
    p.sub {
      color:rgba(255,255,255,.45);
      font-size:clamp(12px,3.2vw,14px);
      text-align:center;
      margin-top:-14px;
    }
    /* White drawing box */
    #draw-wrap {
      position:relative;
      width:min(88vw,62vh);
      height:min(88vw,62vh);
      background:#ffffff;
      border-radius:20px;
      border:3px solid rgba(91,179,224,.5);
      box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 8px 40px rgba(91,179,224,.25);
      overflow:hidden;
      flex-shrink:0;
    }
    #canvas {
      display:block;
      width:100%;
      height:100%;
      touch-action:none;
      cursor:crosshair;
    }
    #btn-clear {
      background:rgba(255,255,255,.07);
      border:1.5px solid rgba(255,255,255,.2);
      color:#fff;
      font-family:inherit;
      font-size:14px;
      font-weight:700;
      padding:11px 26px;
      border-radius:30px;
      cursor:pointer;
      transition:background .18s;
      -webkit-tap-highlight-color:transparent;
    }
    #btn-clear:active { background:rgba(255,255,255,.18); }
    #flash {
      position:fixed;inset:0;
      background:transparent;
      pointer-events:none;
      z-index:50;
      transition:background .08s;
    }
    #flash.on { background:rgba(91,179,224,.3); }
    #success {
      position:fixed;inset:0;
      background:#0d0d1a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      z-index:100;
      opacity:0;
      pointer-events:none;
      transition:opacity .5s ease;
    }
    #success.show { opacity:1; pointer-events:all; }
    #success-icon {
      font-size:78px;
      animation:pop .55s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
    #success h2 {
      font-size:clamp(24px,7vw,38px);
      font-weight:800;
      background:linear-gradient(135deg,#5BB3E0,#D96BA8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:.07em;
      text-align:center;
    }
    #success p {
      color:rgba(255,255,255,.55);
      font-size:clamp(13px,3.5vw,16px);
      text-align:center;
      max-width:260px;
      line-height:1.5;
    }
    #particles { position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden; }
    .pt {
      position:absolute;
      border-radius:50%;
      animation:fall var(--d) var(--delay) ease-in both;
    }
    @keyframes fall {
      0%   { transform:translate(var(--tx),-20px) rotate(0deg);   opacity:1; }
      100% { transform:translate(var(--tx),105vh) rotate(540deg); opacity:0; }
    }
  </style>
</head>
<body>

<h1>&#10022; DESSINE LA FORME &#10022;</h1>
<p class="sub">Trace la figure vue pendant la chor&eacute;e</p>

<div id="draw-wrap">
  <canvas id="canvas"></canvas>
</div>

<button id="btn-clear">Recommencer</button>
<div id="flash"></div>

<div id="success">
  <div id="particles"></div>
  <div id="success-icon">&#10022;</div>
  <h2>MISSION ACCOMPLIE !</h2>
  <p>Vous avez trouv&eacute; la bonne forme !</p>
</div>

<script>
/* == CANVAS SETUP == */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function sizeCanvas() {
  const r = canvas.getBoundingClientRect();
  const w = Math.round(r.width);
  const h = Math.round(r.height);
  if (canvas.width === w && canvas.height === h) return;
  canvas.width  = w;
  canvas.height = h;
  paintBg();
  redrawAll();
}

function paintBg() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', sizeCanvas);
window.addEventListener('load',   sizeCanvas);
setTimeout(sizeCanvas, 60);

/* == DRAWING STATE == */
var strokes   = [];
var current   = null;
var lastPt    = null;
var timer     = null;
var validated = false;

/* == COORDS == */
function getPos(e) {
  var r   = canvas.getBoundingClientRect();
  var src = e.touches ? (e.touches[0] || e.changedTouches[0]) : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

/* == INCREMENTAL DRAW (instant feedback) == */
function seg(a, b) {
  ctx.save();
  // Gradient from blue to pink along x axis
  var grd = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grd.addColorStop(0,   '#5BB3E0');
  grd.addColorStop(1,   '#D96BA8');
  ctx.strokeStyle = grd;
  ctx.lineWidth   = 6;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.shadowColor = '#9B7EC8';
  ctx.shadowBlur  = 8;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
  ctx.restore();
}

function redrawAll() {
  strokes.forEach(function(s){
    for(var i=1;i<s.length;i++) seg(s[i-1],s[i]);
  });
  if(current) for(var i=1;i<current.length;i++) seg(current[i-1],current[i]);
}

/* == POINTER HANDLERS == */
function onDown(e) {
  e.preventDefault();
  if(validated) return;
  clearTimeout(timer);
  var p = getPos(e);
  current = [p];
  lastPt  = p;
}

function onMove(e) {
  e.preventDefault();
  if(!current || validated) return;
  var p = getPos(e);
  if(Math.hypot(p.x-lastPt.x, p.y-lastPt.y) < 2) return;
  seg(lastPt, p);
  current.push(p);
  lastPt = p;
}

function onUp(e) {
  e.preventDefault();
  if(!current || validated) return;
  if(current.length >= 4) {
    strokes.push(current);
    clearTimeout(timer);
    timer = setTimeout(analyse, 350);
  }
  current = null;
  lastPt  = null;
}

canvas.addEventListener('pointerdown',   onDown, { passive:false });
canvas.addEventListener('pointermove',   onMove, { passive:false });
canvas.addEventListener('pointerup',     onUp,   { passive:false });
canvas.addEventListener('pointercancel', onUp,   { passive:false });

/* == RDP == */
function rdp(pts, eps) {
  if(pts.length <= 2) return pts.slice();
  var n=pts.length-1, maxD=0, idx=0;
  for(var i=1;i<n;i++){
    var d=perpDist(pts[i],pts[0],pts[n]);
    if(d>maxD){maxD=d;idx=i;}
  }
  if(maxD<eps) return [pts[0],pts[n]];
  return rdp(pts.slice(0,idx+1),eps).concat(rdp(pts.slice(idx),eps).slice(1));
}

function perpDist(pt,a,b){
  var dx=b.x-a.x, dy=b.y-a.y;
  if(dx===0&&dy===0) return Math.hypot(pt.x-a.x,pt.y-a.y);
  return Math.abs(dy*pt.x-dx*pt.y+b.x*a.y-b.y*a.x)/Math.hypot(dx,dy);
}

/* == TRIANGLE DETECTION == */
function analyse() {
  var all = [];
  for(var i=0;i<strokes.length;i++) all = all.concat(strokes[i]);
  if(all.length < 8) return;

  var perim = 0;
  for(var i=1;i<all.length;i++) perim += Math.hypot(all[i].x-all[i-1].x, all[i].y-all[i-1].y);
  if(perim < 100) return;

  var gap = Math.hypot(all[0].x-all[all.length-1].x, all[0].y-all[all.length-1].y);
  if(gap/perim > 0.32) return; // allow imperfectly closed triangles

  // Large epsilon so wobbly sides merge into straight lines
  var eps    = Math.max(25, perim*0.10);
  var simple = rdp(all, eps);
  var n      = simple.length;
  // 3 corners = perfect; 4 = triangle drawn without perfectly closing
  if(n < 3 || n > 4) return;

  // Anti-scribble: measure how closely the raw path follows the simplified shape.
  // For a real triangle the user traces ~1x-1.5x the ideal perimeter.
  // For a scribble the path is much longer relative to the simplified shape.
  var simPerim = 0;
  for(var i=1;i<simple.length;i++) simPerim += Math.hypot(simple[i].x-simple[i-1].x, simple[i].y-simple[i-1].y);
  // Close the simplified polygon
  simPerim += Math.hypot(simple[0].x-simple[simple.length-1].x, simple[0].y-simple[simple.length-1].y);
  if(perim / simPerim > 1.8) return; // scribble: raw path is much longer than the ideal triangle

  validated = true;
  triggerSuccess();
}

/* == SUCCESS == */
function triggerSuccess() {
  var f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(function(){ f.classList.remove('on'); }, 180);
  setTimeout(function(){
    spawnConfetti();
    document.getElementById('success').classList.add('show');
  }, 380);
}

function spawnConfetti() {
  var wrap = document.getElementById('particles');
  wrap.innerHTML = '';
  var colors = ['#5BB3E0','#D96BA8','#ffffff','#7ECEF4','#E87DB5','#ffd6f0'];
  for(var i=0;i<55;i++){
    var el   = document.createElement('div');
    el.className = 'pt';
    var size = 5 + Math.random()*8;
    el.style.cssText =
      '--tx:'+ ((Math.random()-0.5)*70) +'vw;'+
      '--d:' + (1.1+Math.random()*1.8) +'s;'+
      '--delay:'+Math.random()*0.7+'s;'+
      'left:'+(5+Math.random()*90)+'%;'+
      'top:0;'+
      'width:'+size+'px;height:'+size+'px;'+
      'background:'+colors[i%colors.length]+';';
    wrap.appendChild(el);
  }
}

/* == CLEAR == */
document.getElementById('btn-clear').addEventListener('click', function(){
  clearTimeout(timer);
  strokes   = [];
  current   = null;
  lastPt    = null;
  validated = false;
  paintBg();
  document.getElementById('success').classList.remove('show');
});
</script>
</body>
</html>
