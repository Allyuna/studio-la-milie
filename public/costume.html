<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Mission – Habille la danseuse</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100%;background:#0d0d1a;font-family:'Poppins',Arial,sans-serif;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

    .page{width:100%;max-width:440px;padding:20px 20px 52px;display:flex;flex-direction:column;align-items:center;gap:18px}

    .back{align-self:flex-start;background:none;border:none;color:rgba(255,255,255,.4);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
    .back:active{color:#fff}

    h1{font-size:clamp(16px,4.5vw,21px);font-weight:800;letter-spacing:.09em;background:linear-gradient(135deg,#5BB3E0,#D96BA8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
    .sub{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-top:-10px}

    /* ── dressing row ── */
    .row{display:flex;align-items:center;justify-content:center;gap:14px;width:100%}
    .arrow{flex-shrink:0;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent;user-select:none}
    .arrow:active{background:rgba(255,255,255,.2);transform:scale(.9)}

    /* ── stage ── */
    .stage{
      position:relative;
      background:#f0eef8; /* light so mix-blend-mode:multiply works */
      border-radius:24px;
      overflow:hidden;
      /* fills remaining width between the two arrows */
      width:min(calc(100vw - 148px), 270px);
      aspect-ratio:3/4;
      box-shadow:0 0 0 2px rgba(91,179,224,.3), 0 8px 32px rgba(91,179,224,.12);
      transition:box-shadow .2s;
      cursor:grab;
    }
    .stage.wrong{
      box-shadow:0 0 0 3px rgba(255,80,80,.7),0 8px 32px rgba(255,80,80,.2);
      animation:shake .35s;
    }
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

    /* silhouette — subtle ghost under the costume */
    .sil{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:.25;pointer-events:none}

    /* costume image — multiply removes white bg so it blends with the silhouette */
    .cos-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply;pointer-events:none;opacity:0;transition:opacity .18s}
    .cos-img.loaded{opacity:1}

    /* CSS placeholder shown when image file is missing */
    .cos-ph{position:absolute;top:8%;left:6%;width:88%;height:84%;border-radius:16px;display:none;align-items:center;justify-content:center;font-size:50px;opacity:.75}

    /* ── info row ── */
    .info{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 2px}
    .cos-name{font-size:15px;font-weight:700}
    .cos-num{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.06em}

    /* ── wrong hint ── */
    .hint{font-size:13px;color:#FF8080;font-weight:600;text-align:center;min-height:20px}

    /* ── validate ── */
    .btn-v{width:100%;padding:16px;border-radius:50px;border:none;background:linear-gradient(135deg,#5BB3E0,#D96BA8);color:#fff;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.04em;transition:transform .1s;-webkit-tap-highlight-color:transparent}
    .btn-v:active{transform:scale(.97)}

    /* ── success ── */
    #success{position:fixed;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;opacity:0;pointer-events:none;transition:opacity .5s}
    #success.show{opacity:1;pointer-events:all}
    .s-icon{font-size:76px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    .s-title{font-size:clamp(22px,6vw,32px);font-weight:800;background:linear-gradient(135deg,#5BB3E0,#D96BA8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
    .s-sub{font-size:14px;color:rgba(255,255,255,.5);text-align:center;max-width:260px;line-height:1.5}
    .btn-home{padding:13px 30px;border-radius:50px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:4px}

    /* ── confetti ── */
    #confetti{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
    .pt{position:absolute;border-radius:50%;animation:fall var(--d) var(--delay) ease-in both}
    @keyframes fall{0%{transform:translate(var(--tx),-20px) rotate(0deg);opacity:1}100%{transform:translate(var(--tx),105vh) rotate(540deg);opacity:0}}
  </style>
</head>
<body>
<div id="confetti"></div>

<div class="page">
  <button class="back" onclick="window.location.href='/'">&#8592; Retour</button>

  <h1>&#10022; HABILLE LA DANSEUSE &#10022;</h1>
  <p class="sub">Quel costume portait-elle pendant le spectacle&nbsp;?</p>

  <div class="row">
    <button class="arrow" id="btn-prev">&#8592;</button>

    <div class="stage" id="stage">
      <!-- silhouette ghost -->
      <img class="sil" src="/costumes/silhouette.png" alt="" onerror="this.style.display='none'" />
      <!-- costume overlay -->
      <img class="cos-img" id="cos-img" src="" alt="" />
      <!-- CSS fallback when image file is missing -->
      <div class="cos-ph" id="cos-ph"></div>
    </div>

    <button class="arrow" id="btn-next">&#8594;</button>
  </div>

  <div class="info">
    <span class="cos-name" id="cos-name">&#8212;</span>
    <span class="cos-num"  id="cos-num">1 / 8</span>
  </div>

  <p class="hint" id="hint"></p>

  <button class="btn-v" id="btn-v">Choisir ce costume &#10003;</button>
</div>

<!-- Success overlay -->
<div id="success">
  <div class="s-icon">&#10022;</div>
  <div class="s-title">BONNE R&Eacute;PONSE&nbsp;!</div>
  <p class="s-sub">Tu as reconnu le bon costume&nbsp;!</p>
  <button class="btn-home" onclick="window.location.href='/'">&#8592; Retour au menu</button>
</div>

<script>
/* ═══════════════════════════════════════
   COSTUMES
   img  → path under /costumes/
   name → display label
   bg   → CSS fallback gradient (shown if image file is missing)
═══════════════════════════════════════ */
var COSTUMES = [
  { img: '/costumes/c1.png', name: 'Bikini ray\u00e9',       bg: 'linear-gradient(135deg,#FF8C5A,#FFD166)' },
  { img: '/costumes/c2.png', name: 'Maillot \u00e0 pois',    bg: 'linear-gradient(135deg,#FFD166,#FF6B6B)' },
  { img: '/costumes/c3.png', name: 'Ensemble sport',         bg: 'linear-gradient(135deg,#FF6FA1,#FFE08A)' },
  { img: '/costumes/c4.png', name: 'Justaucorps bleu',       bg: 'linear-gradient(135deg,#7E9EFF,#A0F0E0)' },
  { img: '/costumes/c5.png', name: 'Costume 5',              bg: 'linear-gradient(135deg,#C084FC,#F0ABFC)' },
  { img: '/costumes/c6.png', name: 'Costume 6',              bg: 'linear-gradient(135deg,#6EE7B7,#3B82F6)' },
  { img: '/costumes/c7.png', name: 'Costume 7',              bg: 'linear-gradient(135deg,#FCA5A5,#FBBF24)' },
  { img: '/costumes/c8.png', name: 'Costume 8',              bg: 'linear-gradient(135deg,#D96BA8,#5BB3E0)' },
];

var CORRECT  = 7; // 0-indexed → costume 8 is correct

/* ═══════════════════════════════════════ */
var current  = 0;
var attempts = 0;
var locked   = false;

var stageEl = document.getElementById('stage');
var imgEl   = document.getElementById('cos-img');
var phEl    = document.getElementById('cos-ph');
var nameEl  = document.getElementById('cos-name');
var numEl   = document.getElementById('cos-num');
var hintEl  = document.getElementById('hint');

function render() {
  var c = COSTUMES[current];
  nameEl.textContent = c.name;
  numEl.textContent  = (current + 1) + ' / ' + COSTUMES.length;
  hintEl.textContent = '';

  // Reset image state
  imgEl.classList.remove('loaded');
  imgEl.style.display = 'block';

  imgEl.onerror = function () {
    imgEl.style.display = 'none';
    phEl.style.display  = 'flex';
    phEl.style.background = c.bg;
    phEl.textContent = '';
  };
  imgEl.onload = function () {
    phEl.style.display = 'none';
    imgEl.classList.add('loaded');
  };

  imgEl.src = c.img;

  // Already cached and broken
  if (imgEl.complete && imgEl.naturalWidth === 0) {
    imgEl.style.display = 'none';
    phEl.style.display  = 'flex';
    phEl.style.background = c.bg;
    phEl.textContent = '';
  } else if (imgEl.complete && imgEl.naturalWidth > 0) {
    phEl.style.display = 'none';
    imgEl.classList.add('loaded');
  }
}

/* ── Navigation ── */
function prev() { if (!locked) { current = (current - 1 + COSTUMES.length) % COSTUMES.length; render(); } }
function next() { if (!locked) { current = (current + 1) % COSTUMES.length; render(); } }

document.getElementById('btn-prev').addEventListener('click', prev);
document.getElementById('btn-next').addEventListener('click', next);

/* ── Swipe on stage ── */
var swipeX = 0;
stageEl.addEventListener('touchstart', function (e) { swipeX = e.touches[0].clientX; }, { passive: true });
stageEl.addEventListener('touchend',   function (e) {
  var dx = e.changedTouches[0].clientX - swipeX;
  if (Math.abs(dx) > 40) { dx < 0 ? next() : prev(); }
}, { passive: true });

/* ── Validate ── */
document.getElementById('btn-v').addEventListener('click', function () {
  if (locked) return;
  attempts++;
  if (current === CORRECT) {
    locked = true;
    spawnConfetti();
    document.getElementById('success').classList.add('show');
  } else {
    stageEl.classList.add('wrong');
    setTimeout(function () { stageEl.classList.remove('wrong'); }, 400);
    var msgs = [
      'Ce n\'est pas \u00e7a\u2026 Cherche encore\u00a0!',
      'Pas tout \u00e0 fait\u00a0! Continue.',
      'Presque\u2026 tu y es presque\u00a0!',
    ];
    hintEl.textContent = msgs[Math.min(attempts - 1, msgs.length - 1)];
  }
});

/* ── Confetti ── */
function spawnConfetti() {
  var w    = document.getElementById('confetti');
  w.innerHTML = '';
  var cols = ['#5BB3E0', '#D96BA8', '#fff', '#7ECEF4', '#E87DB5'];
  for (var i = 0; i < 60; i++) {
    var el  = document.createElement('div');
    el.className = 'pt';
    var sz  = 5 + Math.random() * 8;
    el.style.cssText =
      '--tx:' + ((Math.random() - .5) * 80) + 'vw;' +
      '--d:' + (1.1 + Math.random() * 1.8) + 's;' +
      '--delay:' + Math.random() * .7 + 's;' +
      'left:' + (5 + Math.random() * 90) + '%;top:0;' +
      'width:' + sz + 'px;height:' + sz + 'px;' +
      'background:' + cols[i % cols.length] + ';';
    w.appendChild(el);
  }
}

render();
</script>
</body>
</html>
