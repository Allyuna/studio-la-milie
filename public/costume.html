<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Mission – Habille la danseuse</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100%;background:#0d0d1a;font-family:'Poppins',Arial,sans-serif;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

    .page{width:100%;max-width:440px;padding:20px 20px 52px;display:flex;flex-direction:column;align-items:center;gap:18px}

    .back{align-self:flex-start;background:none;border:none;color:rgba(255,255,255,.4);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
    .back:active{color:#fff}

    h1{font-size:clamp(16px,4.5vw,21px);font-weight:800;letter-spacing:.09em;background:linear-gradient(135deg,#5BB3E0,#D96BA8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
    .sub{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-top:-10px}

    /* ── dressing row ── */
    .row{display:flex;align-items:center;justify-content:center;gap:14px;width:100%}
    .arrow{flex-shrink:0;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent;user-select:none}
    .arrow:active{background:rgba(255,255,255,.2);transform:scale(.9)}

    /* ─────── stage ─────── */
    /* White bg is essential: mix-blend-mode multiply removes white from images */
    .stage{
      position:relative;
      background:#ffffff;
      border-radius:24px;
      overflow:hidden;
      flex:1;
      aspect-ratio:0.55;
      max-height:62vh;
      min-height:320px;
      max-width:260px;
      width:100%;
    }

    /* Silhouette – drawn once, fully opaque black figure */
    .sil{
      position:absolute;
      inset:0;
      width:100%;height:100%;
      object-fit:contain;
      /* multiply: white bg disappears, black body stays black */
      mix-blend-mode:multiply;
    }

    /* Costume overlay – screen blend on top of black silhouette:
       screen(black,color) = color  → costume colours appear on the body
       screen(black,white) = white  → costume white bg appears white on body  (ok)
       screen(white,anything) = white → outside body disappears into white bg */
    .cos{
      position:absolute;
      inset:0;
      width:100%;height:100%;
      object-fit:contain;
      mix-blend-mode:screen;
      transition:opacity .25s;
      pointer-events:none;
      z-index:1;
    }

    /* thumbnail strip at bottom */
    .thumb-bar{display:flex;gap:10px;overflow-x:auto;padding:4px 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .thumb-bar::-webkit-scrollbar{display:none}
    .thumb{
      flex-shrink:0;width:60px;height:60px;border-radius:14px;
      background:#fff;
      overflow:hidden;cursor:pointer;
      border:2.5px solid transparent;
      transition:border-color .15s,transform .1s;
    }
    .thumb img{width:100%;height:100%;object-fit:contain}
    .thumb.active{border-color:#5BB3E0}
    .thumb:active{transform:scale(.92)}

    /* ── label ── */
    .cos-label{font-size:15px;font-weight:700;letter-spacing:.04em;min-height:22px;text-align:center}

    /* ── confirm btn ── */
    .btn{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#5BB3E0,#D96BA8);color:#fff;font-family:inherit;font-size:16px;font-weight:800;letter-spacing:.06em;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s,opacity .1s}
    .btn:active{transform:scale(.97);opacity:.9}

    /* ── feedback ── */
    .hint{min-height:52px;font-size:13px;color:rgba(255,255,255,.5);text-align:center;line-height:1.55;padding:0 8px}

    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
    .shake{animation:shake .45s ease}

    /* ── win overlay ── */
    .win-overlay{
      display:none;position:fixed;inset:0;z-index:99;
      background:rgba(13,13,26,.92);
      flex-direction:column;align-items:center;justify-content:center;gap:22px;
      text-align:center;padding:32px;
    }
    .win-overlay.show{display:flex}
    .win-emoji{font-size:72px}
    .win-title{font-size:28px;font-weight:800;background:linear-gradient(135deg,#5BB3E0,#D96BA8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .win-sub{font-size:15px;color:rgba(255,255,255,.6)}
    .win-btn{padding:16px 40px;border:none;border-radius:16px;background:linear-gradient(135deg,#5BB3E0,#D96BA8);color:#fff;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer}
    #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:100}
  </style>
</head>
<body>
<div class="page">
  <button class="back" onclick="history.back()">← Retour</button>
  <h1>HABILLE LA DANSEUSE</h1>
  <p class="sub">Choisis le bon costume !</p>

  <div class="row">
    <button class="arrow" id="prev" aria-label="Précédent">&#8249;</button>

    <div class="stage" id="stage">
      <!-- silhouette always present -->
      <img class="sil" id="sil-img" src="/costumes/silouhette.jpg" alt="silhouette" />
      <!-- active costume overlay -->
      <img class="cos" id="cos-img" src="" alt="costume" />
    </div>

    <button class="arrow" id="next" aria-label="Suivant">&#8250;</button>
  </div>

  <div class="cos-label" id="cos-label"></div>

  <div class="thumb-bar" id="thumbs"></div>

  <p class="hint" id="hint"></p>

  <button class="btn" id="confirm-btn">✓ Choisir ce costume</button>
</div>

<!-- win overlay -->
<div class="win-overlay" id="win-overlay">
  <div class="win-emoji">🎉</div>
  <div class="win-title">BRAVO !</div>
  <div class="win-sub" id="win-sub">Tu as trouvé le bon costume !</div>
  <button class="win-btn" onclick="window.location.href='/'">← Retour à l'accueil</button>
</div>
<canvas id="confetti-canvas"></canvas>

<script>
/* ────────────────────────────────────────────────
   CONFIG – set CORRECT = index of the right costume
   ──────────────────────────────────────────────── */
var COSTUMES = [
  { img: '/costumes/1.png', name: 'Bikini rayé' },
  { img: '/costumes/2.png', name: 'Maillot à pois' },
  { img: '/costumes/3.png', name: 'Ensemble sport' },
  { img: '/costumes/4.png', name: 'Justaucorps bleu' },
  { img: '/costumes/5.png', name: 'Costume 5' },
  { img: '/costumes/6.png', name: 'Costume 6' },
  { img: '/costumes/7.png', name: 'Costume 7' },
  { img: '/costumes/8.png', name: 'Costume 8' },
];
var CORRECT = 7; // 0-indexed → costume 8 (8.png)

var HINTS = [
  "Regarde bien la silhouette...",
  "Il s'agit d'un costume de scène professionnel.",
  "Pense aux couleurs vives et à l'élégance !"
];

/* ── state ── */
var idx = 0;
var wrongCount = 0;

/* ── DOM ── */
var cosImg    = document.getElementById('cos-img');
var silImg    = document.getElementById('sil-img');
var cosLabel  = document.getElementById('cos-label');
var hintEl    = document.getElementById('hint');
var thumbsEl  = document.getElementById('thumbs');
var stage     = document.getElementById('stage');
var overlay   = document.getElementById('win-overlay');

/* ── build thumbnails ── */
COSTUMES.forEach(function(c, i) {
  var div = document.createElement('div');
  div.className = 'thumb' + (i === 0 ? ' active' : '');
  div.dataset.i = i;
  var bg = document.createElement('div');
  bg.style.cssText = 'width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden';
  var im = document.createElement('img');
  im.src = c.img; im.alt = c.name;
  im.style.cssText = 'width:100%;height:100%;object-fit:contain';
  bg.appendChild(im);
  div.appendChild(bg);
  div.addEventListener('click', function(){ go(+this.dataset.i); });
  thumbsEl.appendChild(div);
});

function go(i) {
  idx = (i + COSTUMES.length) % COSTUMES.length;
  cosImg.src = COSTUMES[idx].img;
  cosLabel.textContent = COSTUMES[idx].name;
  document.querySelectorAll('.thumb').forEach(function(t, j){ t.classList.toggle('active', j===idx); });
  // scroll thumb into view
  var active = thumbsEl.children[idx];
  if(active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

document.getElementById('prev').addEventListener('click', function(){ go(idx-1); });
document.getElementById('next').addEventListener('click', function(){ go(idx+1); });

/* swipe */
var tx=0;
stage.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
stage.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>40) go(dx<0?idx+1:idx-1);
},{passive:true});

/* confirm */
document.getElementById('confirm-btn').addEventListener('click', function(){
  if(idx===CORRECT){
    winSequence();
  } else {
    stage.classList.add('shake');
    stage.addEventListener('animationend',function h(){stage.classList.remove('shake');stage.removeEventListener('animationend',h);});
    hintEl.textContent = HINTS[Math.min(wrongCount, HINTS.length-1)];
    wrongCount++;
  }
});

/* ── init ── */
go(0);

/* ──────── WIN SEQUENCE ──────── */
function winSequence(){
  overlay.classList.add('show');
  var sub = document.getElementById('win-sub');
  sub.textContent = '✨ Le bon costume est : ' + COSTUMES[CORRECT].name + ' !';
  startConfetti();
  setTimeout(stopConfetti, 5000);
}

/* tiny confetti */
(function(){
  var C=document.getElementById('confetti-canvas');
  var cx=C.getContext('2d');
  var pieces=[];var running=false;var raf;
  var COLS=['#5BB3E0','#D96BA8','#fff','#FFD700','#a78bfa'];
  function resize(){C.width=window.innerWidth;C.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  function spawn(){
    for(var i=0;i<120;i++){
      pieces.push({x:Math.random()*C.width,y:-10-Math.random()*40,
        vx:(Math.random()-.5)*4,vy:2+Math.random()*4,
        r:5+Math.random()*6,col:COLS[Math.floor(Math.random()*COLS.length)],
        rot:Math.random()*360,rv:(Math.random()-.5)*8,life:1});
    }
  }
  function frame(){
    cx.clearRect(0,0,C.width,C.height);
    pieces=pieces.filter(function(p){return p.y<C.height+20&&p.life>0;});
    pieces.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.life-=0.005;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);
      cx.fillStyle=p.col;cx.globalAlpha=p.life;
      cx.fillRect(-p.r/2,-p.r/4,p.r,p.r/2);
      cx.restore();
    });
    if(running)raf=requestAnimationFrame(frame);
  }
  window.startConfetti=function(){running=true;spawn();frame();};
  window.stopConfetti=function(){running=false;cancelAnimationFrame(raf);setTimeout(function(){cx.clearRect(0,0,C.width,C.height);},200);};
})();
</script>
</body>
</html>
