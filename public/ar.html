<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AR — Color Escape</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Poppins',Arial,sans-serif;-webkit-tap-highlight-color:transparent}

    /* ── MindAR container ─── */
    #ar-container{position:fixed;inset:0;width:100%;height:100%}
    #ar-container video{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;object-fit:cover!important;z-index:0}
    #ar-container canvas{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;z-index:1}

    /* ── Splash ─── */
    #splash{position:fixed;inset:0;z-index:500;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:36px;color:#fff;text-align:center}
    #splash img{width:84px;height:84px;object-fit:contain;border-radius:16px;background:#fff;padding:8px;box-shadow:0 4px 20px rgba(91,179,224,.3)}
    .s-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4)}
    .s-title{font-size:21px;font-weight:800;background:linear-gradient(135deg,#7ECEF4,#E87DB5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .s-desc{font-size:13px;color:rgba(255,255,255,.5);max-width:260px;line-height:1.7}
    #start-btn{padding:15px 44px;background:linear-gradient(135deg,#5BB3E0,#D96BA8);color:#fff;font-family:'Poppins',Arial,sans-serif;font-size:16px;font-weight:700;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(91,179,224,.4)}
    #status-line{font-size:12px;color:rgba(255,255,255,.4);min-height:18px;transition:color .3s}
    #status-line.err{color:#ff6b6b}
    .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#5BB3E0;border-radius:50%;animation:spin .8s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── HUD ─── */
    #hud{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:space-between;pointer-events:none;padding:max(env(safe-area-inset-top),40px) 20px max(env(safe-area-inset-bottom),36px)}
    #hud.on{display:flex}
    .hud-top{display:flex;flex-direction:column;align-items:center;gap:8px}
    .h-badge{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.65);text-shadow:0 1px 5px rgba(0,0,0,.9)}
    .h-pill{background:linear-gradient(135deg,#5BB3E0,#D96BA8);color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 14px;border-radius:20px}
    .h-hint{background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:13px;font-weight:500;padding:9px 16px;border-radius:13px;text-align:center;max-width:240px;line-height:1.5;transition:opacity .4s}

    /* viewfinder */
    #vf{position:relative;width:190px;height:190px}
    .co{position:absolute;width:30px;height:30px}
    .tl{top:0;left:0;border-top:3px solid #7ECEF4;border-left:3px solid #7ECEF4;border-radius:3px 0 0 0}
    .tr{top:0;right:0;border-top:3px solid #E87DB5;border-right:3px solid #E87DB5;border-radius:0 3px 0 0}
    .bl{bottom:0;left:0;border-bottom:3px solid #E87DB5;border-left:3px solid #E87DB5;border-radius:0 0 0 3px}
    .br{bottom:0;right:0;border-bottom:3px solid #7ECEF4;border-right:3px solid #7ECEF4;border-radius:0 0 3px 0}
    #sl{position:absolute;left:5px;right:5px;height:2px;background:linear-gradient(90deg,transparent,#7ECEF4 40%,#E87DB5 60%,transparent);box-shadow:0 0 7px rgba(126,206,244,.9);animation:sweep 2s ease-in-out infinite}
    @keyframes sweep{0%{top:0;opacity:1}85%{top:100%;opacity:.4}100%{top:100%;opacity:0}}
    #dot{position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:#7ECEF4;box-shadow:0 0 7px #7ECEF4;transform:translate(-50%,-50%);animation:dotpulse 2s ease-in-out infinite;transition:background .3s,box-shadow .3s}
    #dot.locked{background:#4cff91;box-shadow:0 0 10px #4cff91;animation:none}
    @keyframes dotpulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.4);opacity:1}}

    .hud-bot{display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:all}
    #found-btn{display:none;padding:14px 40px;background:linear-gradient(135deg,#5BB3E0,#D96BA8);color:#fff;font-family:'Poppins',Arial,sans-serif;font-size:15px;font-weight:700;border:none;border-radius:50px;cursor:pointer;animation:btnpulse 1.8s ease-in-out infinite}
    @keyframes btnpulse{0%,100%{box-shadow:0 4px 18px rgba(91,179,224,.4)}50%{box-shadow:0 5px 28px rgba(217,107,168,.6)}}
    #manual-btn{font-size:11px;color:rgba(255,255,255,.4);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:'Poppins',Arial,sans-serif}

    /* ── Error overlay ─── */
    #err{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.9);flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:36px;text-align:center;color:#fff;font-family:'Poppins',Arial,sans-serif}
    #err.on{display:flex}
    #err h2{font-size:19px;font-weight:700}
    #err p{font-size:13px;color:rgba(255,255,255,.6);max-width:280px;line-height:1.65}
    #err button{padding:11px 28px;background:linear-gradient(135deg,#5BB3E0,#D96BA8);border:none;border-radius:50px;color:#fff;font-family:'Poppins',Arial,sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
    #err-manual{font-size:11px;color:rgba(255,255,255,.38);text-decoration:underline;cursor:pointer;margin-top:2px}
  </style>
</head>
<body>

<div id="ar-container"></div>

<div id="hud">
  <div class="hud-top">
    <div class="h-badge">Color Escape</div>
    <div class="h-pill">Mission 5 / 15</div>
    <div id="hint" class="h-hint">📷 Pointez vers le logo<br/><strong>Studio La Milie</strong></div>
  </div>
  <div id="vf">
    <div class="co tl"></div><div class="co tr"></div>
    <div class="co bl"></div><div class="co br"></div>
    <div id="sl"></div>
    <div id="dot"></div>
  </div>
  <div class="hud-bot">
    <button id="found-btn" onclick="confirmCode()">✓ J'ai le code !</button>
    <button id="manual-btn" onclick="manualFallback()">Impossible de scanner ?</button>
  </div>
</div>

<div id="splash">
  <img src="/logo.jpg" alt="Studio La Milie" />
  <div>
    <div class="s-label">Color Escape — Mission 5</div>
    <div class="s-title">Le Code Secret</div>
  </div>
  <p class="s-desc">Pointez votre caméra vers le logo Studio La Milie pour révéler le code secret.</p>
  <button id="start-btn" onclick="startAR()">📷 Lancer la caméra</button>
  <div class="spinner" id="spinner"></div>
  <div id="status-line"></div>
</div>

<div id="err">
  <h2 id="err-title">⚠️ Erreur</h2>
  <p id="err-msg">Une erreur est survenue.</p>
  <button onclick="location.reload()">Réessayer</button>
  <div id="err-manual" onclick="manualFallback()">Entrer le code manuellement</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
<script>
'use strict';

// ── Helpers ───────────────────────────────────────────────
function setStatus(msg, isErr) {
  const el = document.getElementById('status-line');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
}
function showError(title, msg) {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err').classList.add('on');
}

// ── Card texture ──────────────────────────────────────────
function buildCard(code) {
  const W=512, H=256, cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  function rr(x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  }
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#4AAAD8');bg.addColorStop(1,'#CC5FA0');
  rr(0,0,W,H,36);ctx.fillStyle=bg;ctx.fill();
  const sh=ctx.createLinearGradient(0,0,0,H*.55);
  sh.addColorStop(0,'rgba(255,255,255,.18)');sh.addColorStop(1,'rgba(255,255,255,0)');
  rr(2,2,W-4,H*.55,34);ctx.fillStyle=sh;ctx.fill();
  rr(5,5,W-10,H-10,32);ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='700 20px Poppins,Arial';ctx.textAlign='center';ctx.fillText('CODE SECRET',W/2,48);
  ctx.save();ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=16;ctx.shadowOffsetY=6;
  ctx.fillStyle='#fff';ctx.font='800 138px Poppins,Arial';ctx.textBaseline='middle';ctx.fillText(code,W/2,H/2+18);
  ctx.restore();
  return cv;
}

// ── All MindAR init happens here, on tap ─────────────────
// Nothing runs at page load — avoids top-level errors that
// would silently prevent startAR from being defined.
let mindarThree = null;

window.startAR = async function() {
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.style.opacity = '0.5';
  document.getElementById('spinner').style.display = 'block';
  setStatus('Initialisation…');

  try {
    // Build MindAR instance
    mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: document.getElementById('ar-container'),
      imageTargetSrc: '/targets.mind',
      maxTrack: 1,
      uiLoading: 'no',
      uiScanning: 'no',
      uiError: 'no',
    });
    const {renderer, scene, camera} = mindarThree;
    renderer.setClearColor(0x000000, 0);

    // Lights
    scene.add(new window.THREE.AmbientLight(0xffffff, 1.0));
    const dl = new window.THREE.DirectionalLight(0xffffff, 1.1);
    dl.position.set(.5,1,2); scene.add(dl);

    // Card mesh
    const tex = new window.THREE.CanvasTexture(buildCard('473'));
    const card = new window.THREE.Mesh(
      new window.THREE.BoxGeometry(.50,.25,.022),
      [
        new window.THREE.MeshPhongMaterial({color:0x4AAAD8}),
        new window.THREE.MeshPhongMaterial({color:0x4AAAD8}),
        new window.THREE.MeshPhongMaterial({color:0x4AAAD8}),
        new window.THREE.MeshPhongMaterial({color:0x4AAAD8}),
        new window.THREE.MeshPhongMaterial({map:tex}),
        new window.THREE.MeshPhongMaterial({color:0xCC5FA0}),
      ]
    );
    card.position.set(0,.20,0); card.scale.set(0,0,0);

    // Particles
    const pGeo = new window.THREE.SphereGeometry(.007,4,4);
    const pMats = [
      new window.THREE.MeshBasicMaterial({color:0x7ECEF4}),
      new window.THREE.MeshBasicMaterial({color:0xE87DB5}),
      new window.THREE.MeshBasicMaterial({color:0xffffff}),
    ];
    const particles = Array.from({length:16},(_,i)=>{
      const m = new window.THREE.Mesh(pGeo, pMats[i%3]);
      m.visible = false;
      m.userData = {ph:(i/16)*Math.PI*2,r:.26+Math.random()*.14,sp:.45+Math.random()*.55,yb:.20+Math.random()*.18,ya:.025+Math.random()*.025};
      return m;
    });

    // Anchor
    const anchor = mindarThree.addAnchor(0);
    anchor.group.add(card);
    particles.forEach(p => anchor.group.add(p));

    let trackStart = null, btnShown = false;

    anchor.onTargetFound = () => {
      trackStart = Date.now();
      document.getElementById('hint').innerHTML = '🎯 Tenez immobile…';
      document.getElementById('dot').classList.add('locked');
    };
    anchor.onTargetLost = () => {
      if (btnShown) return;
      trackStart = null;
      card.scale.set(0,0,0);
      particles.forEach(p => { p.visible = false; });
      document.getElementById('hint').innerHTML = '📷 Pointez vers le logo<br/><strong>Studio La Milie</strong>';
      document.getElementById('dot').classList.remove('locked');
    };

    // Start camera
    setStatus('Ouverture de la caméra…');
    await mindarThree.start();

    // Success
    document.getElementById('splash').style.display = 'none';
    document.getElementById('hud').classList.add('on');

    renderer.setAnimationLoop(() => {
      const t = Date.now();
      if (trackStart !== null) {
        const el = t - trackStart;
        const p = Math.min(1, el/700);
        const s = 1 - Math.pow(1-p, 3);
        card.scale.set(s,s,s);
        card.position.y = .20 + Math.sin(t*.0019)*.013;
        card.rotation.y = Math.sin(t*.0009)*.09;
        card.rotation.x = Math.sin(t*.0013)*.04;
        if (el > 500) {
          particles.forEach(p => {
            p.visible = true;
            const u = p.userData;
            const a = t*.001*u.sp + u.ph;
            p.position.x = Math.cos(a)*u.r;
            p.position.z = Math.sin(a)*u.r;
            p.position.y = u.yb + Math.sin(t*.0025+u.ph)*u.ya;
            p.scale.setScalar(.6 + .4*Math.abs(Math.sin(t*.002+u.ph)));
          });
        }
        if (el > 2500 && !btnShown) {
          btnShown = true;
          document.getElementById('found-btn').style.display = 'block';
          document.getElementById('hint').style.opacity = '0';
        }
      }
      renderer.render(scene, camera);
    });

  } catch(e) {
    console.error('AR error:', e);
    const msg = (e && e.message || '').toLowerCase();
    if (msg.includes('permission') || msg.includes('denied') || msg.includes('notallowed')) {
      showError('📷 Accès caméra refusé', 'Allez dans Réglages → Safari → Caméra → Autoriser, puis rechargez.');
    } else if (msg.includes('notfound') || msg.includes('devicenotfound')) {
      showError('📷 Caméra introuvable', 'Aucune caméra détectée sur cet appareil.');
    } else {
      showError('⚠️ Erreur (' + ((e && e.name) || '?') + ')', 'Détail : ' + (e && e.message || String(e)));
    }
  }
};

window.confirmCode = function() {
  if (mindarThree) try { mindarThree.stop(); } catch(_) {}
  localStorage.setItem('ce_code_mission5', '473');
  localStorage.setItem('ce_code_mission5_ts', Date.now().toString());
  window.location.href = '/?mission=5&status=complete';
};

window.manualFallback = function() {
  if (mindarThree) try { mindarThree.stop(); } catch(_) {}
  const v = prompt('Entrez le code que vous avez trouvé :');
  if (v === null) { location.reload(); return; }
  if (v.trim() === '473') {
    localStorage.setItem('ce_code_mission5', '473');
    localStorage.setItem('ce_code_mission5_ts', Date.now().toString());
    window.location.href = '/?mission=5&status=complete';
  } else {
    alert('Code incorrect — cherchez encore ! 🔍');
    location.reload();
  }
};

window.addEventListener('beforeunload', () => {
  if (mindarThree) try { mindarThree.stop(); } catch(_) {}
});
</script>
</body>
</html>
